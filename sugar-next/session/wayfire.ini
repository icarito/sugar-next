# Sugar Next standalone Wayfire session.
#
# bootstrap.sh installs a display-manager entry automatically when Wayfire
# and passwordless sudo are available (/usr/share/wayland-sessions/
# sugar-next.desktop, pointing back at this file in place — no copy step).
# To try it nested inside an existing session instead, without installing
# anything:
#   wayfire -c session/wayfire.ini
#
# Wayfire (not river) is the reference standalone compositor — see
# design.md's D3 in the casilda-activity-host change for why: river 0.4.x
# separated compositor from window manager and needs an external
# river-window-management-v1 WM that isn't packaged yet. Wayfire ships a
# complete WM and was verified end-to-end (open/close/focus tracking via
# wlr-foreign-toplevel-management, activate(seat)-based focus-follow).
#
# Traditional floating placement, not tiled — apps the learner opens are
# ordinary windows, placed by Wayfire, not auto-tiled (design D3/D4: Sugar
# Next does not own placement of *other* windows). The shell fullscreens
# itself in-app (main.py's `_on_activate`, standalone-mode branch, called
# after present()) rather than via a window-rule here — window-rules'
# only lifecycle event (`created`) races GTK4's first-paint under Wayfire
# (upstream issues #957, #1094: a created-time maximize/fullscreen rule
# renders the client as flat grey, no content). No Wayfire-native hook
# exists later than `created` (confirmed against the wiki), so this is
# handled from the app side instead. See main.py's comment for detail.

[core]
# foreign-toplevel: advertises zwlr_foreign_toplevel_manager_v1 — what
#   Sugar Next's TopLevelTracker consumes for window open/close/focus.
# autostart: starts Sugar Next as the session shell.
# decoration, move, resize, place: ordinary window management for any
#   other app the learner opens alongside Sugar Next.
plugins = autostart foreign-toplevel decoration move resize place command

[autostart]
# SUGAR_NEXT_CMD lets a dev launcher point this at the editable source
# tree (see .vscode/tasks.json's "Run Sugar Next (Wayfire standalone)");
# the installed session entry (session/sugar-next.desktop) leaves it unset
# and gets the bootstrap.sh-installed binary.
sugar_next = sh -c "${SUGAR_NEXT_CMD:-sugar-next}"

[command]
# Super+Return opens a terminal — lets a developer launch apps manually to
# exercise the window-observation adapter against externally-opened
# windows (window-observation spec's "external window is tracked"
# scenario), same as any other window manager's terminal binding.
binding_terminal = <super> KEY_ENTER
command_terminal = alacritty
